image: ghcr.io/berriai/litellm:main-stable
replicas: 1
port: 4000
serviceAccountName: litellm

# k8s Secret (synced from Vault by VSO) holding the master key
masterKeySecret:
  name: litellm-secret
  key: master_key

# Backend OpenAI-compatible server (llama.cpp, ClusterIP)
backend:
  endpoint: http://llama-cpp.llama-cpp.svc.cluster.local:8080/v1
  model: gpt-oss

# Public model name clients request
modelName: gpt-oss

# Internal gateway + hostname (overridden by Terraform)
gateway:
  name: eg-internal
  namespace: envoy-gateway-system
hostname: llm.int.example.com
