{{- define "litellm.config" -}}
model_list:
{{- range .Values.models }}
  - model_name: {{ .name }}
    litellm_params:
      model: openai/{{ .model }}
      api_base: {{ .endpoint }}
      api_key: "sk-noauth"
{{- end }}
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
litellm_settings:
  callbacks: ["prometheus"]
  require_auth_for_metrics_endpoint: false
{{- end -}}
{{- $config := include "litellm.config" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  config.yaml: |
{{ $config | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/config: {{ $config | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      containers:
        - name: litellm
          image: {{ .Values.image }}
          args: ["--config", "/etc/litellm/config.yaml", "--port", "{{ .Values.port }}"]
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.masterKeySecret.name }}
                  key: {{ .Values.masterKeySecret.key }}
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: {{ .Values.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # LLM responses (reasoning model + cold model load) can take minutes.
      timeouts:
        request: "600s"
        backendRequest: "600s"
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.port }}
