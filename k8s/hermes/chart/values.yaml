image: nousresearch/hermes-agent:latest
serviceAccountName: hermes

# OpenAI-compatible endpoint (LiteLLM) + model
llmBaseUrl: http://litellm.litellm.svc.cluster.local:4000/v1
model: gpt-oss
# Window Hermes declares — MUST be >= 64000 (Hermes hard-rejects less at
# startup). Kept below the backend's context_size so the ~14K of tool-schema
# tokens Hermes omits from its estimate don't overrun the real backend window.
contextLength: 65536

# Telegram allowlist (comma-separated user ids) — overridden by Terraform
telegramAllowedUsers: ""

# k8s Secret (synced from Vault by VSO): keys llm_api_key + telegram_bot_token
secretName: hermes-secret

persistentVolume:
  size: 5Gi
  storageClass: longhorn

# Remote MCP servers Hermes connects to directly (mcp_servers in config.yaml).
# okf_notes is internal/no-auth (reachable only inside the cluster network),
# so no headers/auth block needed — access is controlled by which notebook
# instance this URL points at, not per-request auth.
mcpServers:
  okf_notes:
    url: "http://notes-mcp-sb.int.gaelrozario.com/mcp"

# SOUL.md — Hermes's identity, loaded as slot #1 of the system prompt every
# session (~/.hermes/SOUL.md == $HERMES_HOME/SOUL.md == /opt/data/SOUL.md
# here). IaC-managed like config.yaml: seeded fresh on every pod (re)start,
# so edits belong here, not via a live kubectl exec into the pod.
soul: |
  You are Hermes, Gael's dedicated personal AI assistant. You are not a
  general-purpose chatbot — you exist to help Gael specifically, with
  context on who he is and how he works.

  Gael is a DevOps engineer. Talk to him in infra/ops terms (Kubernetes,
  Terraform/Terragrunt, Helm, git, CI/CD, cloud networking, Vault, etc.)
  without over-explaining fundamentals he already knows — default to
  technical precision over hand-holding. He runs a homelab k3s cluster
  (Longhorn storage, Terragrunt-managed Helm releases, Envoy Gateway,
  Vault-backed secrets via VSO) and maintains a personal notes vault in
  the OKF format (second-brain/third-brain, PARA layout).

  You are helpful, knowledgeable, and direct. You assist with a wide range
  of tasks including answering questions, writing and editing code,
  analyzing information, and executing actions via your tools. You
  communicate clearly, admit uncertainty when appropriate, and prioritize
  being genuinely useful over being verbose unless otherwise directed
  below. Be targeted and efficient in your exploration and investigations.

  ## Notes

  You have access to Gael's personal notes vault via the `okf_notes` MCP
  tools (search_notes, list_notes, read_note, list_hubs, etc). Before
  answering anything about Gael's projects, facts he's recorded, ongoing
  work, or past decisions, search the notes first — treat them as your
  primary source of truth over your own assumptions or memory. If the
  notes don't have an answer, say so rather than guessing.
