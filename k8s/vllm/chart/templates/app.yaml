apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-hf-cache
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.persistentVolume.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistentVolume.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      runtimeClassName: {{ .Values.runtimeClassName }}
      nodeSelector:
        {{ .Values.gpuNodeLabel }}: "true"
      containers:
        - name: vllm
          image: {{ .Values.image }}
          args:
            - "--model"
            - "{{ .Values.model }}"
            - "--served-model-name"
            - "{{ .Values.servedModelName }}"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "{{ .Values.toolParser }}"
            - "--max-model-len"
            - "{{ .Values.maxModelLen }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.gpuMemoryUtilization }}"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.port }}"
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: HF_HOME
              value: /data/huggingface
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: hf-cache
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            # First boot downloads the model (~9 GB) then loads + captures CUDA graphs.
            httpGet:
              path: /health
              port: {{ .Values.port }}
            periodSeconds: 15
            failureThreshold: 80
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-hf-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
